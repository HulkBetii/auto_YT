name: AH Pipeline — Process Jobs

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:          # allow manual trigger

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Trigger chain cycle
        run: |
          curl -sf \
            -H "Authorization: Bearer ${{ secrets.WEB2_DASHBOARD_SECRET }}" \
            "${{ vars.WEB2_BASE_URL }}/api/cron/process-jobs" \
            | jq .
